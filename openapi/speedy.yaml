        deliveryNote:
          type: string
          description: Shipment delivery note (if shipment is delivered)
    PrimaryShipment:
      type: object
      properties:
        id:
          type: string
          description: Primary shipment id
        type:
          type: string
          enum:
            - RETURN_SHIPMENT
            - STORAGE_PAYMENT
            - REDIRECT
            - SEND_BACK
            - MONEY_TRANSFER
            - TRANSPORT_DAMAGED
            - RETURN_VOUCHER
          description: >-
            Primary shipment type - how this secondary shipment is related to
            primary one
                              
                                    RETURN_SHIPMENT - if this shipment is one of return of documents (rod) / returnReceipt / swap / return of pallets (rop) for a primary one
                                    STORAGE_PAYMENT - if this shipment is for warehouse charges for a primary one
                                    REDIRECT - if this shipment redirects primary one 
                                    SEND_BACK - if this shipment returns primary one to sender
                                    MONEY_TRANSFER - if this shipment is a money transfer for a primary one
                                    TRANSPORT_DAMAGED - if this shipment is for damaged primary shipment transport
                                    VOUCHER_RETURN - if this shipment is a voucher return for a primary one
    SecondaryShipment:
      type: object
      properties:
        id:
          type: string
          description: Secondary shipment id
        type:
          type: string
          enum:
            - RETURN_SHIPMENT
            - STORAGE_PAYMENT
            - REDIRECT
            - SEND_BACK
            - MONEY_TRANSFER
            - TRANSPORT_DAMAGED
            - RETURN_VOUCHER
          description: >-
            Primary shipment type - how this secondary shipment is realted to
            primary one
                               RETURN_SHIPMENT - if this shipment is one of return of documents (rod) / returnReceipt / swap / return of pallets (rop) for a primary one STORAGE_PAYMENT - if this shipment is for warehouse charges for a primary one REDIRECT - if this shipment redirects primary one  SEND_BACK - if this shipment returns primary one to sender MONEY_TRANSFER - if this shipment is a money transfer for a primary one TRANSPORT_DAMAGED - if this shipment is for damaged primary shipment transport VOUCHER_RETURN - if this shipment is a voucher return for a primary one
        parcels:
          type: array
          items:
            $ref: "#/components/schemas/ShipmentParcelNumber"
          description: Shipment parcels
        pickupDate:
          type: string
          format: date
          description: Secondary shipment pickup date
        serviceId:
          type: integer
          format: int64
          description: Secondary shipment service id
        hasScans:
          type: boolean
          description: Flag that shows whether the secondary shipment is scanned
    ShipmentParcelNumber:
      type: object
      properties:
        id:
          type: string
          description: Parcel id
        seqNo:
          type: integer
          format: int64
          description: Parcel sequence number in the shipment.
