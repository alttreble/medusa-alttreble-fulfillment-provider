        packageUniqueNumber:
          type: integer
          format: int64
          description: Package number associated with parcel.
        declaredSize:
          $ref: "#/components/schemas/ShipmentParcelSize"
          description: Parcel declared size
        measuredSize:
          $ref: "#/components/schemas/ShipmentParcelSize"
          description: Parcel measured size
        calculationSize:
          $ref: "#/components/schemas/ShipmentParcelSize"
          description: Parcel calculation size
        declaredWeight:
          type: number
          format: double
          description: Parcel declared weight
        measuredWeight:
          type: number
          format: double
          description: Parcel measured weight
        calculationWeight:
          type: number
          format: double
          description: Parcel calculation weight
        externalCarrierParcelNumbers:
