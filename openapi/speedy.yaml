        workingTimeHalfFrom:
          type: string
          description: Office work time start for days with saturday (HALF) working schedule
        workingTimeHalfTo:
          type: string
          description: Office work time end for days with saturday (HALF) working schedule
        workingTimeDayOffFrom:
          type: string
          description: Office work time start for non-working days (DAY OFF)
        workingTimeDayOffTo:
          type: string
          description: Office work time end for non-working days (DAY OFF)
        sameDayDepartureCutoff:
          type: string
          description: Office same day departure cutoff for days with standard (FULL)
            working schedule (departure of parcels delivered to office after the
            cutoff time is next working day)
        sameDayDepartureCutoffHalf:
          type: string
          description: Office same day departure cutoff for days with saturday (HALF)
            working schedule (departure of parcels delivered to office after the
            cutoff time is next working day)
        sameDayDepartureCutoffDayOff:
          type: string
          description: Office same day departure cutoff for non-working days (DAY OFF)
            working schedule (departure of parcels delivered to office after the
            cutoff time is next working day)
        maxParcelDimensions:
          $ref: "#/components/schemas/ShipmentParcelSize"
          description: Max parcels dimensions for this office
        maxParcelWeight:
          type: number
          format: double
          description: Max parcel weight
        type:
          type: string
          enum:
            - OFFICE
            - APT
          description: Office type
        nearbyOfficeId:
          type: integer
          format: int64
          description: Nearby office id
        workingTimeSchedule:
          type: array
          items:
            $ref: "#/components/schemas/OfficeWorkingTimeSchedule"
          description: Office work time schedule for next days
        palletOffice:
          type: boolean
          description: Pallet office flag
        cardPaymentAllowed:
          type: boolean
          description: Flag, indicating this office allows card payments
        cashPaymentAllowed:
          type: boolean
          description: Flag, indicating this office allows cash payments
        validFrom:
          type: string
          format: date
          description: Valid from date
        validTo:
          type: string
          format: date
          description: Valid to date
        cargoTypesAllowed:
          type: array
          items:
            type: string
            enum:
              - PARCEL
              - PALLET
              - TYRE
          description: Allowed cargo types
        pickUpAllowed:
          type: boolean
          description: Flag, indicating whether parcels can be picked up from office
        dropOffAllowed:
          type: boolean
          description: Flag, indicating whether parcels can be dropped-off in office
        routingInformation:
          $ref: "#/components/schemas/RoutingInformation"
    OfficeWorkingTimeSchedule:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Date this schedule is applicable for
        workingTimeFrom:
          type: string
          description: Office working time start for this date
        workingTimeTo:
          type: string
          description: Office working time end for this date
        sameDayDepartureCutoff:
          type: string
          description: Office same day departure cutoff for this day (departure of parcels
            delivered to office after the cutoff time is next working day)
        standardSchedule:
          type: boolean
          description: If true - it is from standard schedule, otherwise office working
            time is overridden for this specific day
    CalculationService:
      type: object
      properties:
        pickupDate:
          type: string
          format: date
          description: "The date for shipment pickup. Constraints: Could be today or a
            future date"
        autoAdjustPickupDate:
          type: boolean
          description: To find first available date for pickup starting from pickupDate
            according to pickup schedule for services
        serviceIds:
          type: array
          items:
            type: integer
            format: int64
          description: "Services for which calculation is requested Constraints: Each
            service id (code) should be valid for the destination."
        additionalServices:
          $ref: "#/components/schemas/ShipmentSubServices"
          description: "Defines sub-services (like COD, Declared value, etc.) associated
            with the shipment. Constraints: Sub-services may be allowed or
            forbidden for selected service and/or destination."
        deferredDays:
          type: integer
          format: int64
          description: "This parameter allows users to specify by how many (business) days
            they would like to postpone the shipment delivery from the standard
            term. Constraints: Allowed values are 0, 1 and 2"
        saturdayDelivery:
          type: boolean
          description: This parameter may adjust delivery date to the first business day,
            if the standard calculated delivery day is a half-working day. If
            not specified, system will determine this flag based on configured
            delivery customer working schedule
      required:
        - serviceIds
    CalculationSender:
      type: object
      properties:
        clientId:
          type: integer
          format: int64
          description: "Client id to refer serving client Constraints: Validate for
            existence."
        privatePerson:
          type: boolean
          description: Private person flag.
        addressLocation:
          $ref: "#/components/schemas/CalculationAddressLocation"
          description: Address location, implies pickup at client address
        dropoffOfficeId:
          type: integer
          format: int64
          description: "Drop-off office id Constraints: Validated for valid office."
        dropoffGeoPUDOId:
          type: string
          description: "DPD drop off office PUDO id Constraints: Should refer to a valid
            accessible DPD office."
    CalculationRecipient:
      type: object
      properties:
        clientId:
          type: integer
          format: int64
          description: "Client id to refer serving client Constraints: Validate for
            existence."
        privatePerson:
          type: boolean
          description: Private person flag.
        addressLocation:
          $ref: "#/components/schemas/CalculationAddressLocation"
          description: Address location, implies delivery at client address
        pickupOfficeId:
          type: integer
          format: int64
          description: "Pickup office id Constraints: Validated for valid office."
        pickupGeoPUDOId:
          type: string
          description: "DPD pickup office PUDO id Constraints: Should refer to a valid
            accessible DPD office."
    CalculationAddressLocation:
      type: object
      properties:
        countryId:
          type: integer
          format: int64
          description: "Country ISO code. If not provided, local country is assumed. Used
            for all address types. Constraints: Validated for valid country
            code."
        stateId:
          type: string
          description: "Country state. Used for addresses of type 2 (foreign address).
            Constraints: Validated for valid country state."
        siteId:
          type: integer
          format: int64
          description: "Site id. Used for all address types. Constraints: Validated for
            valid site"
        siteType:
          type: string
          description: "Site type can be used in conjunction with countryId and siteName
            to find unique site. Used for addresses of type 1 (local address).
            Constraints: Max 20 characters"
        siteName:
          type: string
          description: "Site type can be used in conjunction with countryId and siteName
            to find unique site. Used for all address types. Constraints: Max 50
            characters"
        postCode:
          type: string
          description: "Can be used in conjunction with countryId to find unique site.
            Used for all address types. Constraints: Validated for valid
            postcode in site and country. Max 10 characters"
    CalculationContent:
      type: object
      properties:
        parcelsCount:
          type: integer
          format: int64
          description: "Total shipment parcels count. Ignored, if parcels list is not
            empty. Constraints: Validated against the minimum and maximum
            allowed for the service."
        totalWeight:
          type: number
          format: double
          description: "Total weight declared for the shipment. Ignored, if parcels list
            is not empty. The total weight is the sum of all parcels
            declaredWeight in that case. Constraints: Validated against the
            minimum and maximum allowed for the service."
        documents:
          type: boolean
          description: Documents flag of the shipment
        palletized:
          type: boolean
          description: Palletized flag of the shipment.
        parcels:
          type: array
          items:
            $ref: "#/components/schemas/ShipmentParcel"
          description: "List of parcels Constraints: Validated against the service
            configuration and pickup and delivery capacity of the depots and
            couriers."
    CalculationResult:
      type: object
      properties:
        serviceId:
          type: integer
          format: int64
          description: Service id
        additionalServices:
          $ref: "#/components/schemas/ShipmentSubServices"
          description: Additional services included in calculation
        price:
          $ref: "#/components/schemas/ShipmentPrice"
          description: Returned, if customer has access to view the amounts of the shipment.
        pickupDate:
          type: string
          format: date
          description: Pickup date.
        deliveryDeadline:
          type: string
          format: date-time
          description: Deadline for delivery. Returned, if available
        error:
          $ref: "#/components/schemas/Error"
          description: Response error.
    Client:
      type: object
      properties:
        clientId:
          type: integer
          format: int64
          description: Client id
        clientName:
          type: string
          description: Client name
        objectName:
          type: string
          description: Object name
        contactName:
          type: string
          description: Contact name
        address:
          $ref: "#/components/schemas/Address"
          description: Client address
        email:
          type: string
          description: Client email
        privatePerson:
          type: boolean
          description: Private person flag.
    Shipment:
      type: object
      properties:
        id:
          type: string
          description: Shipment id
        sender:
          $ref: "#/components/schemas/Sender"
          description: Shipment sender.
        recipient:
          $ref: "#/components/schemas/Recipient"
          description: Shipment recipient.
        service:
          $ref: "#/components/schemas/ShipmentService"
          description: Shipment service level agreement.
        content:
          $ref: "#/components/schemas/Content"
          description: Shipment content.
        payment:
          $ref: "#/components/schemas/Payment"
          description: Shipment payment.
        shipmentNote:
          type: string
          description: Customer’s note associated with the shipment.
        ref1:
          type: string
          description: Reference number or text.
        ref2:
          type: string
          description: Reference number or text.
        price:
          $ref: "#/components/schemas/ShipmentPrice"
          description: Shipment payment.
        delivery:
          $ref: "#/components/schemas/ShipmentDelivery"
          description: Shipment delivery.
        primaryShipment:
          $ref: "#/components/schemas/PrimaryShipment"
          description: Primary shipment.
        returnShipmentId:
          type: string
          description: Return shipment id (in case this shipment is returned to sender)
        redirectShipmentId:
          type: string
          description: Redirect shipment id (in case this shipment is redirected to new
            delivery location)
        pendingShipment:
          type: boolean
          description: >-
            If this flag is true, the shipment is created in pending shipment
            state.
                              Shipments in pending shipment state can have incomplete data that defines logistics (without complete addresses, only sites)
                              Pending shipment state is closed with updateShipment method that makes shipments complete.
    Sender:
      allOf:
        - $ref: "#/components/schemas/Client"
        - type: object
          properties:
            dropoffOfficeId:
              type: integer
              format: int64
              description: Drop-off office id
            dropoffGeoPUDOId:
              type: string
              description: DPD PUDO Id
    Recipient:
      allOf:
        - $ref: "#/components/schemas/Client"
        - type: object
          properties:
            pickupOfficeId:
              type: integer
              format: int64
              description: Pickup office id
            pickupGeoPUDOId:
              type: string
              description: DPD PUDO Id
    Content:
      type: object
      properties:
        parcelsCount:
          type: integer
          format: int64
          description: Total shipment parcels count.
        declaredWeight:
          type: number
          format: double
          description: Shipment declared weight
        measuredWeight:
          type: number
          format: double
          description: Shipment measured weight
        calculationWeight:
          type: number
          format: double
          description: Shipment calculation weight
        contents:
          type: string
          description: Shipment content’s description.
        package:
          type: string
          description: Shipment package.
        documents:
          type: boolean
          description: Documents flag of the shipment (shipment content is documents)
        palletized:
          type: boolean
          description: Palletized flag of the shipment.
        parcels:
          type: array
          items:
            $ref: "#/components/schemas/Parcel"
          description: Shipment parcels
        pendingParcels:
          type: boolean
          description: >-
            If this flag is true, the shipment is created in pending parcels
            state.
                              Shipments in pending parcels state allows adding parcels with addParcel method.
                              Pending parcels state is closed with finalizePendingShipment method.
    Parcel:
      type: object
      properties:
        id:
          type: string
