components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    PaymentReportRequest:
      type: object
      properties:
        dateTo:
          type: string
        dateFrom:
          type: string
    PaymentReportRow:
      type: object
      properties:
        num:
          type: integer
          format: int64
        type:
          type: string
        payType:
          type: string
        payDate:
          type: string
        amount:
          type: number
          format: double
        currency:
          type: string
        createdTime:
          type: string
    Error:
      type: object
      description: |
        Generic error
      properties:
        type:
          type: string
        message:
          type: string
        fields:
          type: array
          items:
              type: string
        innerErrors:
          type: array
          items:
              $ref: "#/components/schemas/Error"
    ThreeWayLogisticsRequest:
      type: object
      properties:
        requester_name:
          type: string
        requester_phone:
          type: string
        requester_email:
          type: string
        requester_company_name:
          type: string
        requester_username:
          type: string
        supplier_company_name:
          type: string
        supplier_contact_person:
          type: string
        supplier_phone:
          type: string
        supplier_city:
          type: string
        supplier_address:
          type: string
        supplier_date_for_visit:
          type: string
        supplier_time_for_visit:
          type: string
        receiver_name:
          type: string
        receiver_company_name:
          type: string
        receiver_phone:
          type: string
        receiver_email:
          type: string
        description_shipment_description:
          type: string
        description_shipment_count:
          type: string
        description_shipment_weight:
          type: string
        description_additional_instructions:
          type: string
        description_payment_sum_to_supplier:
          type: string
        delivery_details_city:
          type: string
        delivery_details_address:
          type: string
        delivery_details_office:
          type: string
        dc:
          type: string
        dccp:
          type: string
        email_on_delivery:
          type: string
        invoice_before_pay:
          type: string
        preview:
          type: string
        test:
          type: string
        payment_delivery_and_return_by_me:
          type: string
        payment_return_by_me:
          type: string
        payment_delivery_by_requester:
          type: string
        payment_delivery_by_receiver:
          type: string
        oc_sum:
          type: string
        cd_sum:
          type: string
        priority_delivery_time_before:
          type: string
        priority_delivery_time_after:
          type: string
        priority_delivery_time_in:
          type: string
    ThreeWayLogisticsResponse:
      type: object
    GetClientProfilesRequest:
      type: object
      description: |
