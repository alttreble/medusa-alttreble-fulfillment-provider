openapi: 3.0.3
info:
  title: EEcont
  version: '1.0.0'
  description: |
    <div style="display:none;background-color: #eee;padding: 15px 15px 4px 15px;margin-bottom: 15px;border-radius: 15px;"><p>На тестовата среда на API интеграцията със системата на Еконт, е качена версия за подготовка на пратки в евро. Единственото изискване е за всяка пратка да се подава валута за НП/ОС, ако има такива услуги.</p><p>От <b>средата на 12.2025 г.</b> същата версия ще бъде качена и в реална среда, като ще функционира по аналогичен начин.</p>
    <p>От <b>01.01.2026 г</b>., предварително създадени товарителници в лева, ще бъдат автоматично превалутирани в евро и не е необходимо да се правят промени по тях, преди приема им.</p>
    <hr style="border-top-color: #ccc;margin: 10px 0;border-top-style: dotted;">
    <p>On the test environment for the API integration with Econt’s system, a version supporting the preparation of shipments in euros has been deployed. The only requirement is that a currency must be provided for COD/declared-value services, if such services are included.</p>
    <p>Starting from <b>mid-December 2025</b>, the same version will be deployed in the live environment and will function in the same way.</p>
    <p>From <b>01.01.2026</b>, waybills created in advance in Bulgarian lev will be automatically converted to euros, and no changes will be required before their acceptance.</p>
    </div>
    
    <p>
    API integration with Econt provides the following options (version 1.0 / 24.04.2018):
    </p>
    <ul>
    	<li><a href="https://ee.econt.com/services/Shipments/#LabelService"><font color="#0000ff"><u>creating and validating label(s)</u></font></a></li>
    	<li><a href="https://ee.econt.com/services/Shipments/#LabelService-deleteLabels"><font color="#0000ff"><u>deleting label(s)</u></font></a></li>
    	<li><a href="https://ee.econt.com/services/Shipments/#ShipmentService-requestCourier"><font color="#0000ff"><u>requesting a courier</u></font></a> to collect a shipment from address at a given time range</li>
    	<li>checking <a href="https://ee.econt.com/services/Shipments/#ShipmentService-getShipmentStatuses"><font color="#0000ff"><u>shipment status</u></font></a>, tracking a shipment</li>
    	<li>information about Econt's <a href="https://ee.econt.com/services/Nomenclatures/#NomenclaturesService-getOffices"><font color="#0000ff"><u>offices</u></font></a></li>
    	<li>information about <a href="https://ee.econt.com/services/Nomenclatures/#NomenclaturesService-getCountries"><font color="#0000ff"><u>countries</u></font></a> and <a href="https://ee.econt.com/services/Nomenclatures/#NomenclaturesService-getCities"><font color="#0000ff"><u>cities</u></font></a> served by Econt</li>
    	<li>information about the <a href="https://ee.econt.com/services/Nomenclatures/#NomenclaturesService-getStreets"><font color="#0000ff"><u>streets</u></font></a> and <a href="https://ee.econt.com/services/Nomenclatures/#NomenclaturesService-getQuarters"><font color="#0000ff"><u>neighborhoods</u></font></a> in the cities served by Econt</li>
    	<li>information about <a href="https://ee.econt.com/services/Profile/#ProfileService-getClientProfiles"><font color="#0000ff"><u>user</u></font></a> of e-econt (addresses for sending and receiving shipments)</li>
    </ul>
    <div style="margin: 25px 0">
    	<h4><a target="_blank" href="https://ee.econt.com/services/openapi.yaml">OpenAPI Specification</a></h4>
    	<h4><a target="_blank" href="https://www.postman.com/it-partner-4635083/econt-shipping-apis">Postman Collection</a></h4>
    </div>
    
    HTTP request type - POST!
    <br/><br/>
    Authentication using SSL client certificates is currently not supported, but you can use an SSL connection and authorize in the query. The credentials below should be provided as BASIC authentication header in the http request.
    <br/><br/>                          
    For the test system (https://demo.econt.com/ee/services/) you can use the following credentials: 
    <ul>
    	<li>username: iasp-dev</li>
    	<li>password: 1Asp-dev</li>
    </ul>
    
    Important! The DEMO endpoints for the services are different than the production ones!
    <br/><br/>
    You need to replace the following in the URLs for every endpoint if you wish to set up DEMO implementation first:
    <br/>ee.econt.com/services" &lt;-&gt; "demo.econt.com/ee/services"
    <br/><br/>
    
    For the production system (https://ee.econt.com/services/) you can use:
    <ul>
    	<li>an existing e-econt user's credentials</li>
    	<li>register a new user <a href="https://ee.econt.com/load_direct.php?target=Register"><font color="#0000ff"><u>here</u></font></a> or by contacting an Econt employee</li>
    </ul>
    <br/>
    <a href="https://ee.econt.com/xml_api_example.php"><font color="#0000ff"><u>Here</u></font></a> you can see how a query is sent to the API and how to convert PHP arrays from/to XML. The example contains only required fields and frequently used services. 
    <br/>
    <a href="https://ee.econt.com/doc_templates/GreeceIntegrationAPIGuide.php"><font color="#0000ff"><u>Here</u></font></a> you can see instructions for deliveries to and from Greece via Econt API.
    <br/>
    <a href="$inet://https://delivery-demo.econt.com/services/#office-locator"><font color="#0000ff"><u>Here</u></font></a> you can see instructions for implementation of Office Locator.
    <br/><br/>
    For questions, you may file service requests by e-mail at <a href="mailto:support_integrations@econt.com"><font color="#0000ff"><u>support_integrations@econt.com</u></font></a><b>. </b>Our Service Desk Agent will help you solve technical problems and provide technical advice.
